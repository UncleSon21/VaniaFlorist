<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="100%" style="stop-color:#6d5a44"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#f5f0e8" stroke-width="1"/>
  
  <!-- Flower petals -->
  <g transform="translate(16,16)">
    <!-- 5 petals around center -->
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#e8dcc6" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#e8dcc6" transform="rotate(72)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#e8dcc6" transform="rotate(144)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#e8dcc6" transform="rotate(216)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#e8dcc6" transform="rotate(288)"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="3" fill="#8b7355"/>
    <circle cx="0" cy="0" r="1.5" fill="#a89477"/>
  </g>
  
  <!-- Letter V -->
  <text x="16" y="25" font-family="Georgia,serif" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="grey">V</text>
</svg>